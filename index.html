<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocoa Learning Game - NeoBrutalism</title>
    <link rel="stylesheet" href="https://matifandy8.github.io/NeoBrutalismCSS/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="main-header" style="display: none;">
        <h1>Belajar Bareng Cocoa!</h1>
        <div id="user-info">
            <span id="username-display"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </header>

    <main id="game-container">
        <section id="login-screen" class="card">
            <h2>Login untuk Bermain</h2>
            <input type="text" id="username-input" placeholder="Masukkan nama pengguna...">
            <button onclick="startSession()">Mulai Sesi</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
